<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Hyper mega auvers</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  height: 100vh;
  font-family: sans-serif;
  background-color: black;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 🎯 Center */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🧊 Card */
.card {
  height: 90vh;
  aspect-ratio: 9/16; /* 🔥 mieux que width:auto */
  perspective: 1200px;
}

.inner-card {
  width: 100%;
  height: 100%;
  border-radius: 4px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  will-change: transform;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.inner-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="inner-card" id="card">
      <img src="./ticket de caisse.png">
    </div>
  </div>
</div>

<script>

/* =========================
   🎬 BACKGROUND INTELLIGENT
========================= */

function getBackgroundGif() {
  const isMobile =  window.innerWidth <= window.innerHeight;

  const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

  let isLowQuality = false;

  if (connection && connection.effectiveType) {
    isLowQuality = ["slow-2g", "2g", "3g"].includes(connection.effectiveType);
  } else {
    isLowQuality = window.innerWidth < 500;
  }

  if (isMobile) {
    return isLowQuality ? "./mobile-low.gif" : "./mobile-high.gif";
  } else {
    return isLowQuality ? "./desktop-low.gif" : "./desktop-high.gif";
  }
}

function applyBackground() {
  document.body.style.backgroundImage = `url('${getBackgroundGif()}')`;
}

/* debounce resize (perf 🔥) */
let resizeTimeout;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(applyBackground, 200);
});

applyBackground();


/* =========================
   🧊 ANIMATION 3D
========================= */

const card = document.getElementById("card");

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

let useGyro = false;

/* 🎯 Animation fluide */
function animate() {
  currentX += (targetX - currentX) * 0.1;
  currentY += (targetY - currentY) * 0.1;

  card.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* 🖱️ Desktop UNIQUEMENT */
document.addEventListener("mousemove", (e) => {
  if (useGyro) return; // 🔥 évite conflit

  targetX = (window.innerWidth / 2 - e.clientX) / 20;
  targetY = (window.innerHeight / 2 - e.clientY) / 20;
});


/* =========================
   📱 GYRO AU CLIC
========================= */

function startGyro() {
  useGyro = true;

  window.addEventListener("deviceorientation", (event) => {
    if (event.beta !== null && event.gamma !== null) {
      targetX = event.gamma / 4;
      targetY = event.beta / 4;
    }
  }, true);
}

let gyroActivated = false;

async function enableGyro() {
  if (gyroActivated) return;
  gyroActivated = true;

  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      const res = await DeviceOrientationEvent.requestPermission();

      if (res === "granted") {
        startGyro();
        console.log("Gyro autorisé");
      } else {
        console.log("Gyro refusé");
      }
    } else {
      startGyro();
      console.log("Gyro activé");
    }
  } catch (err) {
    console.error("Erreur gyro :", err);
  }
}

function handleFirstInteraction() {
  enableGyro();

  document.removeEventListener("click", handleFirstInteraction);
  document.removeEventListener("touchstart", handleFirstInteraction);
}

document.addEventListener("click", handleFirstInteraction);
document.addEventListener("touchstart", handleFirstInteraction);

</script>

</body>
</html>
