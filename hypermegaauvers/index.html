<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Hyper mega auvers</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  height: 100vh;
  font-family: sans-serif;
  background-color: black;

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* 🎯 Center */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🧊 Card */
.card {
  height: 90vh;
  aspect-ratio: 9/16; /* 🔥 mieux que width:auto */
  perspective: 1200px;
}

.inner-card {
  width: 100%;
  height: 100%;
  border-radius: 4px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  will-change: transform;
}

.inner-card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="inner-card" id="card">
      <img src="./ticket de caisse.png">
    </div>
  </div>
</div>

<script>

/* =========================
   🎬 BACKGROUND INTELLIGENT
========================= */

function getBackgroundGif() {
  const isMobile = window.innerWidth < window.innerHeight;

  const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

  let isLowQuality = false;

  if (connection && connection.effectiveType) {
    isLowQuality = ["slow-2g", "2g", "3g"].includes(connection.effectiveType);
  } else {
    isLowQuality = window.innerWidth < 500;
  }

  if (isMobile) {
    return isLowQuality ? "./mobile-low.gif" : "./mobile-high.gif";
  } else {
    return isLowQuality ? "./desktop-low.gif" : "./desktop-high.gif";
  }
}

function applyBackground() {
  document.body.style.backgroundImage = `url('${getBackgroundGif()}')`;
}

/* debounce resize */
let resizeTimeout;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(applyBackground, 200);
});

applyBackground();


/* =========================
   🧊 ANIMATION AVEC INERTIE
========================= */

const card = document.getElementById("card");

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

let velocityX = 0;
let velocityY = 0;

let useGyro = false;

/* réglages physiques */
const stiffness = 0.01;
const damping = 0.92;

/* 🎯 animation loop */
function animate() {
  const forceX = (targetX - currentX) * stiffness;
  const forceY = (targetY - currentY) * stiffness;

  velocityX += forceX;
  velocityY += forceY;

  velocityX *= damping;
  velocityY *= damping;

  currentX += velocityX;
  currentY += velocityY;

  card.style.transform = `
    rotateY(${currentX}deg)
    rotateX(${currentY}deg)
    translateZ(20px)
  `;

  requestAnimationFrame(animate);
}
animate();


/* =========================
   🖱️ SOURIS (desktop uniquement)
========================= */

document.addEventListener("mousemove", (e) => {
  if (useGyro) return;

  targetX = (window.innerWidth / 2 - e.clientX) / 20;
  targetY = (window.innerHeight / 2 - e.clientY) / 20;
});


/* =========================
   📱 GYRO FIX IOS
========================= */

function startGyro() {
  useGyro = true;

  window.addEventListener("deviceorientation", (event) => {
    if (event.beta !== null && event.gamma !== null) {
      targetX = event.gamma / 4;
      targetY = event.beta / 4;
    }
  }, true);
}

let gyroActivated = false;

function enableGyroIOS() {
  if (gyroActivated) return;
  gyroActivated = true;

  try {
    if (
      typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function"
    ) {
      DeviceOrientationEvent.requestPermission()
        .then((response) => {
          if (response === "granted") {
            startGyro();
            console.log("Gyro OK iOS");
          } else {
            console.log("Gyro refusé");
            gyroActivated = false;
          }
        })
        .catch((err) => {
          console.error(err);
          gyroActivated = false;
        });
    } else {
      startGyro();
      console.log("Gyro Android OK");
    }
  } catch (err) {
    console.error(err);
    gyroActivated = false;
  }
}

/* 👇 activation au clic n'importe où */
document.body.addEventListener("click", enableGyroIOS);
document.body.addEventListener("touchstart", enableGyroIOS);

</script>

</body>
</html>
