<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>3D Card iOS Compatible</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  height: 100vh;
  font-family: sans-serif;
}

/* 🎥 Background video */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 🎯 Center */
.container {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🧊 Card */
.card {
  width: 300px;
  height: 90vh;
  perspective: 1200px;
}

.inner-card {
  width: 100%;
  height: 100%;
  border-radius: 20px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  will-change: transform;
}

.inner-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔘 Bouton iOS permission */
#enableGyro {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 14px;
  cursor: pointer;
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="container">
  <div class="card">
    <div class="inner-card" id="card">
      <img src="./ticket de caisse.png">
    </div>
  </div>
</div>

<button id="enableGyro">Activer effet 3D</button>

<script>
const card = document.getElementById("card");

let targetX = 0;
let targetY = 0;
let currentX = 0;
let currentY = 0;

let gyroActivated = false;

/* 🎯 Animation fluide */
function animate() {
  currentX += (targetX - currentX) * 0.1;
  currentY += (targetY - currentY) * 0.1;

  card.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
  requestAnimationFrame(animate);
}
animate();

/* 🖱️ Desktop */
document.addEventListener("mousemove", (e) => {
  targetX = (window.innerWidth / 2 - e.clientX) / 20;
  targetY = (window.innerHeight / 2 - e.clientY) / 20;
});

/* 📱 Gyro */
function startGyro() {
  window.addEventListener("deviceorientation", (event) => {
    if (event.beta !== null && event.gamma !== null) {
      targetX = event.gamma / 4;
      targetY = event.beta / 4;
    }
  }, true);
}

/* 🍏 Activation UNE SEULE FOIS */
async function enableGyro() {
  if (gyroActivated) return;
  gyroActivated = true;

  try {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
      const res = await DeviceOrientationEvent.requestPermission();

      if (res === "granted") {
        startGyro();
        console.log("Gyro activé ✅");
      } else {
        console.log("Permission refusée ❌");
      }
    } else {
      // Android
      startGyro();
    }
  } catch (err) {
    console.error(err);
  }
}

/* 👉 UN SEUL événement */
document.addEventListener("click", enableGyro, { once: true });
document.addEventListener("touchstart", enableGyro, { once: true });

</script>

</body>
</html>
